name: CI

on:
  push:
    branches:
      - master
      - staging
      - development
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version or image tag to validate"
        required: false
        default: "manual"

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest httpx

      - name: Static analysis
        run: ruff check app

      - name: Build container
        run: docker build -t devops-ex:${{ github.event.inputs.version || github.sha }} .

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - development
          - staging
          - production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate
