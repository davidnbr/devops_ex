name: CI

on:
  push:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_VERSION: ${{ github.sha }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Format check
        run: black --check app tests

      - name: Static analysis
        run: ruff check app tests

      - name: Build container
        run: docker build -t devops-ex:${{ env.IMAGE_VERSION }} .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          JWT_SECRET: test-secret
          API_KEY: test-api-key
        run: pytest

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - staging
          - production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

  deploy:
    name: Deployment
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - terraform-validate
    if: >-
      ${{
        ( github.ref == 'refs/heads/production' ||
          github.ref == 'refs/heads/master' ||
          github.ref == 'refs/heads/development' ) &&
        env.VERCEL_DEPLOY == 'true'
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform init and plan
        run: |
          terraform -chdir=terraform/environments/${{ github.ref_name }} init && \
          terraform -chdir=terraform/environments/${{ github.ref_name }} plan \
            -var "image_tag=${{ inputs.IMAGE_TAG }}" \
            -out=tfplan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}

      - name: Deploy revision
        run: |
          terraform -chdir=environments/${{ inputs.environment }} apply -auto-approve tfplan
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_TOKEN_APP_TERRAFORM_IO }}
