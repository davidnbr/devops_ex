name: CI

on:
  push:
    branches:
      - master
      - staging
      - development
  pull_request:
  workflow_dispatch:
    inputs:
      version:
        description: "Version or image tag to validate"
        required: false
        default: "manual"
      vercel_deploy:
        description: "Deploy to Vercel when true"
        required: false
        default: "false"

env:
  VERCEL_DEPLOY: ${{ vars.VERCEL_DEPLOY || 'false' }}
  IMAGE_VERSION: ${{ github.event.inputs.version || github.sha }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Format check
        run: black --check app tests

      - name: Static analysis
        run: ruff check app tests

      - name: Build container
        run: docker build -t devops-ex:${{ env.IMAGE_VERSION }} .

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          JWT_SECRET: test-secret
          API_KEY: test-api-key
        run: pytest

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - staging
          - production

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform

      - name: Terraform init
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform/environments/${{ matrix.environment }}
        run: terraform validate

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs:
      - build
      - test
      - terraform-validate
    if: >-
      ${{
        github.ref == 'refs/heads/master' &&
        (env.VERCEL_DEPLOY == 'true' || github.event.inputs.vercel_deploy == 'true')
      }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel deploy --prod --yes --token "$VERCEL_TOKEN"
